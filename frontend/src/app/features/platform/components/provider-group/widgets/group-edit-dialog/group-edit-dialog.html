<p-dialog
  [(visible)]="visible"
  [header]="isEditMode() ? '编辑分组' : '新建分组'"
  [modal]="true"
  [breakpoints]="dialogConfig.breakpoints"
  [style]="dialogConfig.style"
  [contentStyle]="dialogConfig.contentStyle"
  [draggable]="dialogConfig.draggable"
  [resizable]="dialogConfig.resizable"
  [closable]="true"
  [dismissableMask]="!saving"
  [closeOnEscape]="!saving"
  (onHide)="onHide()"
>
  @if (loading) {
    <div class="flex items-center justify-center py-20 text-sm text-muted-color">正在加载分组信息...</div>
  } @else {
    <div class="flex flex-col gap-5">
      @if (isEditMode()) {
        <div class="rounded-lg border border-surface-200 bg-surface-50 px-4 py-3 text-sm text-muted-color dark:border-surface-700 dark:bg-surface-900/60">
          分组只维护元数据。账户归属请在“渠道账户”中配置。
          @if (isDefaultGroup()) {
            <div class="mt-1 text-xs text-primary">`default` 为系统内置分组，名称不可修改，也不可删除。</div>
          }
        </div>
      }

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div class="flex flex-col gap-2">
          <label class="font-bold">分组名称</label>
          <input pInputText [(ngModel)]="formModel().name" placeholder="请输入分组名称" [disabled]="isNameReadonly()" />
          @if (isDefaultGroup()) {
            <small class="text-muted-color">默认分组名称固定为 `default`。</small>
          }
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-bold">费率倍数</label>
          <p-inputNumber
            [(ngModel)]="formModel().rateMultiplier"
            mode="decimal"
            [minFractionDigits]="1"
            [maxFractionDigits]="2"
            [step]="0.1"
            [min]="0.01"
            [max]="100"
            [showButtons]="true"
            buttonLayout="horizontal"
            inputStyleClass="text-center font-mono"
            suffix=" x"
            [disabled]="readonly"
          >
            <ng-template pTemplate="incrementbuttonicon">
              <span class="pi pi-plus"></span>
            </ng-template>
            <ng-template pTemplate="decrementbuttonicon">
              <span class="pi pi-minus"></span>
            </ng-template>
          </p-inputNumber>
          <small class="text-muted-color">范围: 0.01 - 100.00 倍</small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="font-bold">粘性会话</label>
          <div class="flex flex-wrap items-center gap-4">
            <p-toggleswitch [(ngModel)]="formModel().enableStickySession" [disabled]="readonly" />

            @if (formModel().enableStickySession) {
              <div class="flex items-center gap-2">
                <span class="text-sm text-muted-color">过期时间(小时)</span>
                <p-inputNumber
                  [(ngModel)]="formModel().stickySessionExpirationHours"
                  [min]="1"
                  [max]="8760"
                  [showButtons]="true"
                  buttonLayout="horizontal"
                  inputStyleClass="w-16 text-center !py-1"
                  [disabled]="readonly"
                >
                  <ng-template pTemplate="incrementbuttonicon">
                    <span class="pi pi-plus text-xs"></span>
                  </ng-template>
                  <ng-template pTemplate="decrementbuttonicon">
                    <span class="pi pi-minus text-xs"></span>
                  </ng-template>
                </p-inputNumber>
              </div>
            }
          </div>
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="font-bold">描述</label>
          <textarea pTextarea [(ngModel)]="formModel().description" rows="3" class="w-full" placeholder="请输入分组描述" [disabled]="readonly"></textarea>
        </div>
      </div>
    </div>
  }

  <ng-template pTemplate="footer">
    <p-button label="取消" [text]="true" severity="secondary" (onClick)="visible = false" [disabled]="saving" />
    @if (!readonly) {
      <p-button label="保存" icon="pi pi-check" (onClick)="save()" [disabled]="!isValid() || saving" [loading]="saving" />
    }
  </ng-template>
</p-dialog>

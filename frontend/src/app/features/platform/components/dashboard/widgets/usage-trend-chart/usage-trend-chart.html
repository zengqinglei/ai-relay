<div
  class="bg-surface-0 dark:bg-surface-900 rounded-xl border border-surface-200 dark:border-surface-700 h-full flex flex-col p-6 shadow-sm">
  <div class="flex items-center justify-between shrink-0">
    <div>
      <h3 class="font-bold text-lg m-0 text-color">Token 使用与请求趋势</h3>
      <p class="text-xs text-muted-color mt-1 mb-0">所选时间范围内的请求量与 TOKEN 消耗</p>
    </div>
    <div class="flex gap-2">
      <span
        class="flex items-center gap-1.5 text-xs font-medium text-emerald-600 dark:text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Live
      </span>
    </div>
  </div>
  <div class="flex-1 relative w-full min-h-0">
    <p-chart type="line" [data]="chartData()" [options]="chartOptions()" [plugins]="chartPlugins" height="100%"
      width="100%"></p-chart>
  </div>
</div>

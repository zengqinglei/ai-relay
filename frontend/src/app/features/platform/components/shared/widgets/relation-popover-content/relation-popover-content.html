<div class="flex flex-col gap-2 py-0.5" [ngClass]="mode() === 'binding-summary' ? 'min-w-[360px] max-w-[520px]' : 'min-w-[280px] max-w-[420px]'">
  @for (item of items(); track item.id) {
    <div
      class="flex items-center justify-between gap-4 rounded-lg border px-3 py-2 shadow-sm transition-colors"
      [ngClass]="item.isWarning
        ? 'border-orange-200 dark:border-orange-800/30 bg-orange-50/70 dark:bg-orange-950/20'
        : 'border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:bg-surface-50 dark:hover:bg-surface-800'">
      <span
        class="flex-1 truncate text-[12px] font-semibold text-color"
        [pTooltip]="item.leftText"
        tooltipPosition="top"
        tooltipStyleClass="max-w-none whitespace-nowrap">
        {{ item.leftText }}
      </span>
      <span
        class="inline-flex max-w-[220px] shrink-0 items-center truncate rounded border px-2 py-0.5 text-[10px] font-mono"
        [ngClass]="item.isWarning
          ? 'border-orange-200 bg-orange-100 text-orange-600 dark:border-orange-800/40 dark:bg-orange-950/40 dark:text-orange-300'
          : 'border-surface-200 bg-surface-100 text-muted-color dark:border-surface-700 dark:bg-surface-800'"
        [pTooltip]="item.rightText"
        tooltipPosition="top"
        tooltipStyleClass="max-w-none whitespace-nowrap">
        {{ item.rightText }}
      </span>
    </div>
  }
</div>

<div class="flex flex-col gap-2 py-0.5" [ngClass]="mode() === 'binding-summary' ? 'min-w-[280px] max-w-[380px]' : 'min-w-[240px] max-w-[340px]'">
  @for (item of items(); track item.id) {
    <div
      class="flex items-center justify-between gap-4 px-3 py-2 rounded-lg border shadow-sm transition-colors"
      [ngClass]="item.isWarning
        ? 'border-orange-200 dark:border-orange-800/30 bg-orange-50/70 dark:bg-orange-950/20'
        : 'border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:bg-surface-50 dark:hover:bg-surface-800'">
      <span class="text-[12px] font-semibold text-color truncate flex-1">{{ item.leftText }}</span>
      <span
        class="text-[11px] text-right shrink-0"
        [ngClass]="item.isWarning ? 'text-orange-500' : 'text-muted-color font-mono'">
        {{ item.rightText }}
      </span>
    </div>
  }
</div>

<div class="flex flex-col h-full overflow-hidden">
  <div class="flex-1 overflow-y-auto p-6 custom-scrollbar">
    <app-subscription-metrics-cards [metrics]="metrics()" />

    <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4 mb-6">
      <div class="flex flex-col lg:flex-row flex-1 gap-3 items-stretch lg:items-center">
        <app-user-scope-filter
          class="w-full lg:w-auto"
          [showLabel]="false"
          name="subscription-user-scope"
          [options]="userScopeOptions"
          [selected]="userScope()"
          (selectedChange)="setUserScope($event)"
        />

        <p-select
          [options]="statusOptions"
          [ngModel]="selectedStatus()"
          (ngModelChange)="selectedStatus.set($event)"
          (onChange)="onStatusChange()"
          optionLabel="label"
          optionValue="value"
          placeholder="全部状态"
          [showClear]="true"
          appendTo="body"
          styleClass="w-full sm:w-48"
        />

        <p-iconfield class="w-full lg:flex-1 lg:max-w-sm">
          <p-inputicon class="pi pi-search" />
          <input
            pInputText
            type="text"
            placeholder="搜索订阅名 / 用户名..."
            [ngModel]="searchQuery()"
            (ngModelChange)="onSearchQueryChange($event)"
            class="w-full"
          />
        </p-iconfield>
      </div>

      <div class="flex flex-wrap items-center justify-end gap-3 shrink-0">
        <p-button
          icon="pi pi-refresh"
          label="刷新"
          (onClick)="onFilter()"
          styleClass="w-full sm:w-auto"
          pTooltip="刷新"
          tooltipPosition="top"
        >
        </p-button>
        <p-button
          label="新建订阅"
          icon="pi pi-plus"
          (click)="openAddDialog()"
          [outlined]="true"
          severity="primary"
          styleClass="w-full sm:w-auto"
        >
        </p-button>
      </div>
    </div>

    <app-subscription-table
      [subscriptions]="subscriptions()"
      [totalRecords]="totalRecords()"
      [loading]="loading()"
      (filterChange)="onPageChange($event)"
      (edit)="openEditDialog($event)"
      (delete)="handleDelete($event)"
      (statusToggle)="handleStatusToggle($event)"
      (updateExpiryAndEnable)="handleExpiryUpdate($event)"
    />
  </div>
</div>

<app-subscription-edit-dialog
  [(visible)]="editDialogVisible"
  [loading]="editDialogLoading()"
  [saving]="editDialogSaving()"
  [subscription]="selectedSubscription()"
  (saved)="handleSave($event)"
/>

<p-confirmDialog
  header="确认"
  icon="pi pi-exclamation-triangle"
  acceptLabel="确定"
  rejectLabel="取消"
  acceptButtonStyleClass="p-button-danger p-button-text"
  rejectButtonStyleClass="p-button-text p-button-secondary"
>
</p-confirmDialog>

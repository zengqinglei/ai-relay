<header class="py-6 px-6 mx-0 md:mx-12 lg:mx-20 lg:px-20 flex items-center justify-between relative lg:static">
  <!-- Logo -->
  <a class="flex items-center" href="#">
    <app-logo></app-logo>
    <span class="text-color-emphasis font-bold text-2xl leading-normal mr-20 tracking-wide whitespace-nowrap text-transparent bg-clip-text bg-gradient-to-r from-primary-500 to-primary-700 dark:from-primary-300 dark:to-primary-100 drop-shadow-sm">AI Relay</span>
  </a>

  <!-- Mobile Menu Toggle -->
  <button pButton [text]="true" severity="secondary" [rounded]="true" pRipple class="lg:hidden!" (click)="toggleMobileMenu()">
    <i class="pi text-2xl!" [class]="isMobileMenuOpen() ? 'pi-times' : 'pi-bars'"></i>
  </button>

  <!-- Navigation Menu -->
  <div
    class="items-center bg-surface grow justify-end absolute lg:static w-full left-0 top-full px-4 lg:px-0 z-20 transition-all duration-300 ease-in-out mobile-menu lg:mobile-menu-none"
    [class]="isMobileMenuOpen() ? 'flex flex-col lg:flex-row py-4 lg:py-0' : 'hidden lg:flex'"
  >
    <!-- Action Buttons -->
    <div class="flex flex-col lg:flex-row items-center border-t lg:border-t-0 border-surface py-4 lg:py-0 mt-4 lg:mt-0 gap-4 w-full lg:w-auto">
      <!-- Theme Toggles -->
      <div class="flex items-center gap-2">
        <p-button
          [icon]="layoutService.isDarkTheme() ? 'pi pi-moon' : 'pi pi-sun'"
          [text]="true"
          [rounded]="true"
          severity="secondary"
          styleClass="w-10 h-10 border border-surface shadow-sm bg-surface-0 dark:bg-surface-900"
          (onClick)="layoutService.toggleDarkMode()"
        >
        </p-button>

        <div class="relative flex">
          <p-button
            icon="pi pi-palette"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            styleClass="w-10 h-10 border border-surface shadow-sm bg-surface-0 dark:bg-surface-900"
            pStyleClass="@next"
            enterFromClass="hidden"
            enterActiveClass="animate-scalein"
            leaveToClass="hidden"
            leaveActiveClass="animate-fadeout"
            [hideOnOutsideClick]="true"
          >
          </p-button>
          <app-theme-configurator />
        </div>
      </div>
      
      <p-button
        label="登录"
        routerLink="/auth/login"
        [rounded]="true"
        styleClass="w-full lg:w-auto px-6"
        (onClick)="isMobileMenuOpen.set(false)"
      ></p-button>
    </div>
  </div>
</header>

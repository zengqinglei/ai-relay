<header class="py-4 px-6 md:px-12 w-full flex items-center justify-between sticky top-0 z-50 backdrop-blur-xl bg-surface-0/80 dark:bg-surface-900/80 border-b border-surface-200/50 dark:border-surface-800/50 transition-all duration-300">
  <!-- Logo -->
  <a class="flex items-center gap-3 group" href="#">
    <app-logo size="normal" />
    <span class="font-bold text-2xl tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-primary-400 dark:from-primary-400 dark:to-primary-200 whitespace-nowrap">AI Relay</span>
  </a>

  <!-- Mobile Menu Toggle -->
  <button pButton [text]="true" severity="secondary" [rounded]="true" pRipple class="lg:hidden!" (click)="toggleMobileMenu()">
    <i class="pi text-2xl!" [class]="isMobileMenuOpen() ? 'pi-times' : 'pi-bars'"></i>
  </button>

  <!-- Navigation Menu -->
  <div
    class="items-center bg-surface-0/95 dark:bg-surface-900/95 backdrop-blur-xl grow justify-end absolute lg:static w-full left-0 top-full px-6 lg:px-0 z-20 transition-all duration-300 ease-in-out mobile-menu lg:mobile-menu-none shadow-lg lg:shadow-none border-b lg:border-none border-surface-200 dark:border-surface-800"
    [class]="isMobileMenuOpen() ? 'flex flex-col lg:flex-row py-6 lg:py-0' : 'hidden lg:flex'"
  >
    <!-- Action Buttons -->
    <div class="flex flex-col lg:flex-row items-center gap-4 w-full lg:w-auto">
      <!-- Theme Toggles -->
      <div class="flex items-center gap-2">
        <p-button
          [icon]="layoutService.isDarkTheme() ? 'pi pi-moon' : 'pi pi-sun'"
          [text]="true"
          [rounded]="true"
          severity="secondary"
          styleClass="w-10 h-10 bg-surface-100 hover:bg-surface-200 dark:bg-surface-800 dark:hover:bg-surface-700 transition-colors"
          (onClick)="layoutService.toggleDarkMode()"
        >
        </p-button>

        <div class="relative flex">
          <p-button
            icon="pi pi-palette"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            styleClass="w-10 h-10 bg-surface-100 hover:bg-surface-200 dark:bg-surface-800 dark:hover:bg-surface-700 transition-colors"
            pStyleClass="@next"
            enterFromClass="hidden"
            enterActiveClass="animate-scalein"
            leaveToClass="hidden"
            leaveActiveClass="animate-fadeout"
            [hideOnOutsideClick]="true"
          >
          </p-button>
          <app-theme-configurator />
        </div>
      </div>
      
      <p-button
        label="登录"
        icon="pi pi-user"
        routerLink="/auth/login"
        [rounded]="true"
        styleClass="w-full lg:w-auto px-6 font-medium shadow-md shadow-primary-500/20"
        (onClick)="isMobileMenuOpen.set(false)"
      ></p-button>
    </div>
  </div>
</header>

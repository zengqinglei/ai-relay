<section
  id="hero"
  class="flex flex-col pt-6 px-6 lg:px-20 overflow-hidden bg-gradient-to-br from-yellow-100 via-blue-100 to-purple-100"
  style="clip-path: ellipse(150% 87% at 93% 13%)"
>
  <!-- Hero Content -->
  <div class="mx-6 md:mx-20 mt-0 md:mt-6">
    <h1 class="text-4xl md:text-6xl font-bold text-surface-900 leading-tight">
      <span class="font-light block">Eu sem integer</span>
      eget magna fermentum
    </h1>
    <p class="font-normal text-xl md:text-2xl leading-normal md:mt-4 text-surface-700 max-w-2xl">
      Sed blandit libero volutpat sed cras. Fames ac turpis egestas integer. Placerat in egestas erat...
    </p>
    <button
      pButton
      pRipple
      [rounded]="true"
      type="button"
      label="Get Started"
      class="text-lg md:text-xl mt-8 px-6 py-3 bg-primary hover:bg-primary-600 text-white font-medium transition-colors"
    ></button>
  </div>

  <!-- Hero Image -->
  <div class="flex justify-center md:justify-end mt-8 md:mt-0">
    <img
      src="https://primefaces.org/cdn/templates/sakai/landing/screen-1.png"
      alt="Hero Image"
      class="w-9/12 md:w-auto max-w-full h-auto"
      loading="lazy"
    />
  </div>
</section>

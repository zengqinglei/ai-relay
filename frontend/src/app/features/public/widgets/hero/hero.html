<section id="hero"
  class="relative flex flex-col pt-12 pb-20 px-6 lg:px-20 overflow-hidden bg-surface-50 dark:bg-surface-950 transition-colors duration-300">
  <!-- ADVANCED TECH BACKGROUND LAYERS -->

  <!-- 1. Deep Base Gradient -->
  <div
    class="absolute inset-0 z-0 bg-gradient-to-br from-primary-50 via-surface-0 to-surface-100 dark:from-surface-950 dark:via-surface-900 dark:to-primary-900 opacity-80">
  </div>

  <!-- 2. Speed Lines Background -->
  <div class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="speed-grad-hero" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color: transparent; stop-opacity: 0" />
          <stop offset="50%" style="stop-color: var(--p-primary-500); stop-opacity: 1" />
          <stop offset="100%" style="stop-color: transparent; stop-opacity: 0" />
        </linearGradient>
      </defs>
      <g fill="url(#speed-grad-hero)">
        <rect x="0" y="20%" width="100%" height="1" opacity="0.3">
          <animate attributeName="x" from="-100%" to="100%" dur="3s" repeatCount="indefinite" />
        </rect>
        <rect x="0" y="45%" width="100%" height="2" opacity="0.2">
          <animate attributeName="x" from="-100%" to="100%" dur="2s" repeatCount="indefinite" />
        </rect>
        <rect x="0" y="65%" width="100%" height="1" opacity="0.4">
          <animate attributeName="x" from="-100%" to="100%" dur="3.5s" repeatCount="indefinite" />
        </rect>
        <rect x="0" y="85%" width="100%" height="3" opacity="0.1">
          <animate attributeName="x" from="-100%" to="100%" dur="1.5s" repeatCount="indefinite" />
        </rect>
      </g>
    </svg>
  </div>

  <!-- 3. Network Connection Overlay -->
  <svg class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hexagons-hero" width="50" height="43.4" patternUnits="userSpaceOnUse" patternTransform="scale(2)">
        <path
          d="M24.8,22 L24.8,0.2 L8.75,9.5 L8.75,29.8 Z M25.2,22 L41.25,29.8 L41.25,9.5 L25.2,0.2 Z M8.25,30 L8.25,10 L-8,0.5 L-8,21 Z"
          fill="none" stroke="var(--p-primary-500)" stroke-width="1" />
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hexagons-hero)" />
  </svg>

  <!-- 4. Glowing Burst Effect -->
  <div
    class="absolute top-[30%] right-[20%] w-[600px] h-[400px] bg-primary-500/10 rounded-full blur-[80px] z-0 mix-blend-screen animate-pulse pointer-events-none"
    style="animation-duration: 4s"></div>


  <!-- Content Wrapper -->
  <div class="relative z-10 flex flex-col md:flex-row items-center gap-10 mt-12 mx-auto max-w-7xl w-full">
    <!-- Hero Text (Left Box) -->
    <div class="flex-1 text-center md:text-left">
      <h1 class="text-5xl md:text-7xl font-bold text-color leading-tight tracking-tight drop-shadow-sm mb-4">
        AI Relay
      </h1>
      <p class="font-normal text-2xl md:text-3xl leading-normal text-surface-600 dark:text-surface-400">
        强大的大模型聚合与转接平台
      </p>
      <p class="text-base md:text-lg text-surface-500 dark:text-surface-500 mt-4 leading-relaxed max-w-xl mx-auto md:mx-0">
        无缝对接 <strong>ChatGPT、Claude、Gemini</strong> 等订阅模型；支持接入 <strong>魔塔社区</strong> 等第三方中转站，以及原生兼容 <strong>OpenAI / Claude</strong> 接口标准的 API 模型，如 Qwen、MiniMax、GLM 等。
      </p>
      <p-button [rounded]="true" label="立即开始" icon="pi pi-arrow-right" iconPos="right"
        routerLink="/auth/login"
        styleClass="text-lg mt-8 px-8 py-3 shadow-lg shadow-primary-500/30"></p-button>
    </div>

    <!-- Hero Terminal Illustration (Right Box) -->
    <div class="flex-1 flex justify-center w-full max-w-lg md:max-w-xl">
      <div
        class="w-full bg-[#0f172a] rounded-xl border border-slate-700/50 shadow-2xl overflow-hidden backdrop-blur-sm transform transition-all hover:scale-105 duration-300">
        <!-- MacOS Style Window Header -->
        <div class="bg-slate-800/80 px-4 py-3 flex items-center border-b border-slate-700/50">
          <div class="flex gap-2 relative z-10">
            <div class="w-3 h-3 rounded-full bg-red-500/80 shadow-[0_0_5px_rgba(239,68,68,0.5)]"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500/80 shadow-[0_0_5px_rgba(234,179,8,0.5)]"></div>
            <div class="w-3 h-3 rounded-full bg-green-500/80 shadow-[0_0_5px_rgba(34,197,94,0.5)]"></div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span class="text-slate-400 text-xs font-mono select-none">terminal</span>
          </div>
        </div>
        <!-- Terminal Content -->
        <div class="p-6 font-mono text-sm md:text-base">
          <div class="mb-4">
            <span class="text-green-400 mr-2">$</span>
            <span class="text-cyan-400">curl</span>
            <span class="text-slate-300"> -X POST </span>
            <span class="text-blue-300">/v1/messages</span>
          </div>
          <div class="text-slate-500 mb-2 italic"># Routing to upstream...</div>
          <div class="mb-4 flex items-center gap-3">
            <span class="bg-green-500/20 text-green-400 px-2 py-0.5 rounded text-xs border border-green-500/30">200
              OK</span>
            <span class="text-yellow-200">{{ '{"content": "Hello!"}' }}</span>
          </div>
          <div class="animate-pulse">
            <span class="text-green-400 mr-2">$</span>
            <span class="w-2 h-4 bg-green-400 inline-block align-middle"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

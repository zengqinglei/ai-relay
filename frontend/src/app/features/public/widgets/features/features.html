<section id="features" class="py-12 px-6 lg:px-20 mx-0 lg:mx-20 relative z-10 -mt-8">
  <div class="max-w-7xl mx-auto">
    <!-- Top Toggle Buttons (Visual Mockup based on design) -->
    <div class="flex flex-wrap justify-center gap-4 mb-12">
      <div class="flex bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-700 rounded-full p-1 shadow-sm">
        <button class="px-6 py-2 rounded-full font-medium text-primary bg-primary-50 dark:bg-primary-900/40 transition-colors flex items-center gap-2">
          <i class="pi pi-sync"></i> 订阅转 API
        </button>
        <button class="px-6 py-2 rounded-full font-medium text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 transition-colors flex items-center gap-2">
          <i class="pi pi-shield"></i> 会话保持
        </button>
        <button class="px-6 py-2 rounded-full font-medium text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 transition-colors flex items-center gap-2">
          <i class="pi pi-chart-bar"></i> 按量计费
        </button>
      </div>
    </div>

    <!-- Feature Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      @for (feature of features; track feature) {
        <div class="bg-surface-0 dark:bg-surface-900 p-8 rounded-2xl border border-surface-200 dark:border-surface-800 shadow-sm hover:shadow-md transition-shadow">
          <!-- Icon -->
          <div class="flex items-center justify-center mb-6 w-14 h-14 rounded-xl" [class]="feature.bgColor">
            <i class="text-2xl" [class]="'pi ' + feature.icon + ' ' + feature.iconColor"></i>
          </div>
          <!-- Content -->
          <h3 class="text-xl font-bold text-surface-900 dark:text-surface-0 mb-3">
            {{ feature.title }}
          </h3>
          <p class="text-surface-600 dark:text-surface-400 leading-relaxed">
            {{ feature.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>

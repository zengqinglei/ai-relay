<section id="features" class="py-16 px-6 lg:px-20 mx-0 lg:mx-20 relative z-10">
  <div class="max-w-7xl mx-auto">
    <!-- Section Title -->
    <div class="text-center mb-16">
      <h2 class="text-surface-900 dark:text-surface-0 font-bold mb-4 text-3xl md:text-4xl tracking-tight"> 核心业务能力 </h2>
      <p class="text-surface-500 dark:text-surface-400 text-lg"> 针对大模型中继专门优化的稳定体系 </p>
    </div>

    <!-- Feature Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      @for (feature of features; track feature) {
        <div class="group relative bg-surface-0/60 dark:bg-surface-900/40 backdrop-blur-xl p-8 rounded-2xl border border-surface-200/60 dark:border-surface-700/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgba(0,0,0,0.2)] hover:border-primary-500/40 dark:hover:border-primary-400/40 transition-all duration-500 overflow-hidden">
          
          <!-- Hover Gradient Overlay -->
          <div class="absolute inset-0 bg-gradient-to-br from-primary-500/0 via-transparent to-primary-500/0 group-hover:from-primary-500/5 group-hover:to-transparent transition-colors duration-500"></div>

          <!-- Icon -->
          <div class="relative flex items-center justify-center mb-8 w-16 h-16 rounded-2xl transition-transform duration-500 group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(var(--p-primary-500),0.3)]" [class]="feature.bgColor">
            <i class="text-3xl" [class]="'pi ' + feature.icon + ' ' + feature.iconColor"></i>
          </div>

          <!-- Content -->
          <h3 class="relative text-xl font-bold text-surface-900 dark:text-surface-0 mb-4 transition-colors group-hover:text-primary-600 dark:group-hover:text-primary-300">
            {{ feature.title }}
          </h3>
          <p class="relative text-surface-600 dark:text-surface-400 leading-relaxed group-hover:text-surface-700 dark:group-hover:text-surface-300 transition-colors">
            {{ feature.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>

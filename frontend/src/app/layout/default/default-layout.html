<!-- 应用主布局容器 -->
<!-- 使用 bg-surface-ground 作为全局背景色，自动适配 Light/Dark -->
<div class="flex h-screen overflow-hidden bg-surface-ground">
  <!-- 侧边栏：移动端fixed overlay，桌面端relative -->
  <app-default-sidebar
    [isMobileMenuOpen]="isMobileMenuOpen()"
    (mobileMenuClosed)="closeMobileMenu()"
    class="fixed md:relative z-30 md:z-20 h-full transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0"
    [class.translate-x-0]="isMobileMenuOpen()"
  >
  </app-default-sidebar>

  <!-- 移动端遮罩层 -->
  @if (isMobileMenuOpen()) {
    <div class="fixed inset-0 bg-black/50 z-20 md:hidden" (click)="closeMobileMenu()"> </div>
  }

  <!-- 右侧：Header + 内容区域 + Footer -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <app-default-header (toggleMobileMenu)="toggleMobileMenu()"></app-default-header>

    <!-- 主内容区域 -->
    <!-- 使用 bg-surface-50 dark:bg-surface-950 作为背景色，自动适配 Light/Dark -->
    <main class="flex-1 overflow-auto bg-surface-50 dark:bg-surface-950 custom-scrollbar scroll-smooth">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <app-default-footer></app-default-footer>
  </div>
</div>

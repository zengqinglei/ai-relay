name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm and install dependencies
        working-directory: frontend
        run: |
          npm install -g npm@latest
          rm -f package-lock.json
          npm install --prefer-offline --no-audit

      - name: Generate environment.debug.ts with mock enabled
        working-directory: frontend
        run: |
          cat > src/environments/environment.debug.ts << 'EOF'
          import { environmentBase } from './environment.base';

          export const environment = {
            ...environmentBase,
            useMock: {
              enable: true,
              exclude: '',
              delay: 500,
              log: false
            },
            api: {
              ...environmentBase.api,
              gateway: ''
            }
          };
          EOF

      - name: Build
        working-directory: frontend
        run: npm run build -- --configuration=debug --base-href /ai-relay/

      - name: Copy index.html as 404.html
        run: cp frontend/dist/airelay-web/browser/index.html frontend/dist/airelay-web/browser/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/airelay-web/browser

      - id: deployment
        uses: actions/deploy-pages@v4
